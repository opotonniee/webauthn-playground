<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="icon" href="img/favicon.ico" type="image/x-icon">
  <title>WebAuthn Playground</title>

  <link rel="stylesheet" href="css/style.css">
  <!-- privacy-friendly usage stats -->
  <script>
    window.goatcounter = {
      path: function(p) { return location.host + p } // add domain name
    }
    // Only load on production environment, and manually opted-out
    if ((window.location.host !== 'opotonniee.github.io') ||
      (localStorage.getItem("goatcounter." + location.host) === "false") ||
      (localStorage.getItem("goatcounter.ALL") === "false")) {
      window.goatcounter.no_onload = true;
    }
  </script>
  <script data-goatcounter="https://webauthn-playground.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body>

  <header class="header-container not-selectable">
    <h1 id="title"><img src="img/favicon.ico" alt="WebAuthn Playground Icon"> WebAuthn Playground</h1>
    <span id="about">
      <a href="https://github.com/opotonniee/webauthn-playground" target="_blank" rel="noopener" aria-label="GitHub Repository">
        <img class="icon" src="img/github-mark.svg" alt="GitHub Logo">
      </a>
    </span>
  </header>

  <main class="playground-grid">
    <!-- Left Panel: Settings and Controls -->
    <section class="panel panel-controls">

      <div>
        <h2>WebAuthn Operations</h2>
        <div class="operations-bar">
          <div class="operations-row">
            <fieldset class="request-fieldset">
              <legend class="sr-only">Choose Operation</legend>
              <label class="radio-label" for="req-register">
                <input id="req-register" name="request" type="radio" value="0" checked>
                <span class="radio-custom"></span>
                Register
              </label>
              <label class="radio-label" for="req-login">
                <input id="req-login" name="request" type="radio" value="1">
                <span class="radio-custom"></span>
                Login
              </label>
            </fieldset>
            <button id="run" type="button" class="btn btn-primary">Execute</button>
          </div>
        </div>
      </div>

      <div class="config-wrapper">
        <table id="config">
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Right Panel: Input, Output, and Parsing -->
    <section class="panel panel-io">
      <div class="io-split">
        <div class="io-column">
          <div class="io-header">
            <h2 id="input-heading" class="io-title not-selectable">Input</h2>
            <button id="reset-input" type="button" class="icon-button" title="Reset JSON Input" aria-label="Reset JSON Input">🧽</button>
          </div>
          <textarea id="input" class="io-textarea" aria-labelledby="input-heading" autocomplete="off" spellcheck="false"></textarea>
        </div>
        
        <div class="io-column">
          <div class="io-header">
            <h2 id="output-heading" class="io-title not-selectable">Output</h2>
            <button id="parse-output" type="button" class="icon-button" title="Parse JSON Output" aria-label="Parse JSON Output">🔎</button>
          </div>
          <textarea class="result io-textarea" id="output" aria-labelledby="output-heading" autocomplete="off" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="parsed-output-section">
        <div class="parsed-output-header">
          <h2 class="not-selectable">Parsed Output</h2>
          <span id="status" class="result" role="status" aria-live="polite"></span>
        </div>
        <div class="table-responsive">
          <table id="parsed-data" class="result"></table>
        </div>
      </div>
    </section>
  </main>

  <script src="js/cash-8.1.4.min.js"></script>
  <script src="js/idcloud.js"></script>
  <script src="https://opotonniee.github.io/js-config/dist/js-config.js"></script>
  <script src="js/cbor.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
